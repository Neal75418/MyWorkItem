services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: my_work_item
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d my_work_item"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=my_work_item;Username=appuser;Password=apppass"
      Jwt__Key: "ThisIsASecretKeyForDevelopmentOnlyAtLeast32Characters!"
      Jwt__Issuer: MyWorkItem
      Jwt__Audience: MyWorkItemApp
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../../WebstormProjects/my-work-item-web
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    depends_on:
      - api

volumes:
  pgdata:
